<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>State Research Completion — SOSFiler</title>
  <style>
    :root {
      --bg: #0A0A0A;
      --bg-tint: #0E0E0E;
      --surface: #141414;
      --surface-2: #1A1A1A;
      --panel: #141414;
      --ink: #FFFFFF;
      --body: #D0D0D0;
      --muted: #9A9A9A;
      --muted-2: #6B6B6B;
      --line: #1F1F1F;
      --line-strong: #2A2A2A;
      --accent: #CCFF00;
      --green: #39FF14;
      --green-bg: rgba(57,255,20,0.06);
      --red: #FF3366;
      --amber: #FFB23F;
      --blue: #00FFE5;
      --gray: #6B6B6B;
      --font-display: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter Display', system-ui, sans-serif;
      --font-body:    -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Inter', system-ui, sans-serif;
      --font-mono:    'JetBrains Mono', 'IBM Plex Mono', ui-monospace, Menlo, monospace;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: var(--font-body);
      color: var(--ink);
      background: var(--bg);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    body::before {
      content: ''; position: fixed; inset: -40% 30% auto auto;
      width: 800px; height: 800px;
      background: radial-gradient(circle at center, rgba(204,255,0,0.06), transparent 60%);
      pointer-events: none; filter: blur(20px); z-index: 0;
    }
    h1, h2, h3 { font-family: var(--font-display); font-weight: 900; letter-spacing: -0.02em; color: var(--ink); }
    ::selection { background: var(--accent); color: #000; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2A2A2A; border-radius: 2px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    .nav {
      position: sticky; top: 0; z-index: 5;
      background: rgba(10,10,10,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--line);
      padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center; gap: 24px;
    }
    .nav .brand { display: flex; align-items: center; gap: 12px; }
    .nav .brand img { height: 56px; width: auto; }
    .nav .brand-text { font-family: var(--font-display); font-weight: 900; font-size: 14px; letter-spacing: -0.02em; }
    .nav .brand-text span { display: block; color: var(--muted-2); font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.12em; font-weight: 600; margin-top: 2px; text-transform: uppercase; }
    .nav .links { display: flex; gap: 22px; }
    .nav .links a { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); text-decoration: none; }
    .nav .links a:hover { color: var(--accent); }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 32px 24px;
      position: relative;
      z-index: 1;
    }

    .header { margin-bottom: 28px; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 600;
      margin-bottom: 12px;
      display: inline-flex; align-items: center; gap: 10px;
    }
    .eyebrow::before { content: ''; width: 18px; height: 1px; background: var(--accent); display: inline-block; }
    h1 { font-size: clamp(28px, 4vw, 44px); margin: 0 0 12px; line-height: 1.05; }
    .meta { display: flex; flex-wrap: wrap; gap: 20px; color: var(--muted); font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; margin-top: 16px; }
    .meta span { display: inline-flex; align-items: center; gap: 8px; }
    .meta .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; display: inline-block; }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      border: 1px solid var(--line);
      border-radius: 10px;
      overflow: hidden;
      margin: 24px 0 32px;
    }
    @media (max-width: 760px) { .stats { grid-template-columns: 1fr; } }

    .stat {
      padding: 22px 24px;
      background: var(--surface);
      border-right: 1px solid var(--line);
    }
    .stat:last-child { border-right: none; }
    @media (max-width: 760px) { .stat { border-right: none; border-bottom: 1px solid var(--line); } .stat:last-child { border-bottom: none; } }
    .stat .label { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted-2); margin-bottom: 10px; }
    .stat .value { font-family: var(--font-display); font-size: 36px; font-weight: 900; letter-spacing: -0.03em; color: var(--ink); font-variant-numeric: tabular-nums; line-height: 1; }
    .stat .value.accent { color: var(--accent); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    .state {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 18px 20px;
      position: relative;
      transition: border-color .15s ease;
    }
    .state:hover { border-color: var(--line-strong); }
    .state.ready { border-color: rgba(57,255,20,0.35); background: linear-gradient(180deg, var(--surface), rgba(57,255,20,0.03)); }

    .state-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .state-code { font-family: var(--font-display); font-size: 28px; font-weight: 900; letter-spacing: 0.02em; color: var(--ink); }

    .pill { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.15em; padding: 4px 10px; border-radius: 4px; border: 1px solid; }
    .pill.ready { background: rgba(57,255,20,0.08); color: var(--green); border-color: rgba(57,255,20,0.35); }
    .pill.not-ready { background: rgba(255,178,63,0.06); color: var(--amber); border-color: rgba(255,178,63,0.3); }

    .progress-row { font-family: var(--font-mono); font-size: 11px; color: var(--muted); letter-spacing: 0.05em; margin-bottom: 8px; font-variant-numeric: tabular-nums; }

    .bar { width: 100%; height: 4px; border-radius: 0; background: var(--line); overflow: hidden; margin-bottom: 16px; }
    .bar > span { display: block; height: 100%; background: var(--accent); transition: width .4s ease; }
    .state.ready .bar > span { background: var(--green); }

    .tasks { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .task { border: 1px solid var(--line); border-radius: 6px; padding: 8px 10px; background: var(--bg); }
    .task strong { display: block; font-family: var(--font-body); font-size: 11px; color: var(--body); margin-bottom: 4px; font-weight: 600; }
    .task span { font-family: var(--font-mono); font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; font-weight: 700; }

    .status-ready_for_review, .status-verified { color: var(--green); }
    .status-in_progress { color: var(--blue); }
    .status-blocked { color: var(--red); }
    .status-pending, .status-missing { color: var(--muted-2); }

    .error {
      border: 1px solid rgba(255,51,102,0.3);
      background: rgba(255,51,102,0.05);
      color: var(--red);
      border-radius: 8px;
      padding: 14px 16px;
      margin-top: 16px;
      display: none;
      font-size: 13px;
      font-family: var(--font-mono);
    }

    @media (max-width: 640px) {
      .tasks { grid-template-columns: 1fr; }
      .wrap { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <header class="nav">
    <div class="brand">
      <img src="logo.png" alt="SOSFiler" onerror="this.style.display='none';">
      <div class="brand-text">SOSFiler<span>/ INTERNAL · RESEARCH OPS</span></div>
    </div>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="operator.html">Operator</a>
      <a href="dashboard.html">Dashboard</a>
    </div>
  </header>

  <div class="wrap">
    <section class="header">
      <span class="eyebrow">Internal · Research operations</span>
      <h1>State research completion.</h1>
      <div class="meta">
        <span><span class="dot"></span>Auto-refresh · 20 seconds</span>
        <span id="updatedAt">Updated · --</span>
      </div>
    </section>

    <section class="stats">
      <div class="stat">
        <div class="label">/ States ready</div>
        <div id="readyStates" class="value accent">--</div>
      </div>
      <div class="stat">
        <div class="label">/ Total tracked</div>
        <div id="totalStates" class="value">--</div>
      </div>
      <div class="stat">
        <div class="label">/ Overall completion</div>
        <div id="overallPct" class="value">--%</div>
      </div>
    </section>

    <div id="errorBox" class="error"></div>

    <section id="stateGrid" class="grid"></section>
  </div>

  <script>
    const REQUIRED_LABELS = {
      state_filing_map: "State filing",
      state_tax_gateway: "State tax",
      county_directory: "County dir",
      municipality_directory: "City dir",
      county_local_filings: "County filings",
      city_local_filings: "City filings",
      productization: "Productization"
    };

    function fmtDate(iso) {
      const date = new Date(iso);
      if (Number.isNaN(date.getTime())) return iso;
      return date.toLocaleString();
    }

    function statusLabel(s) {
      return String(s || "unknown").replaceAll("_", " ");
    }

    function stateCard(state) {
      const readyClass = state.is_ready_for_formations_and_changes ? "ready" : "";
      const pillClass = state.is_ready_for_formations_and_changes ? "ready" : "not-ready";
      const pillText = state.is_ready_for_formations_and_changes ? "READY" : "NOT READY";
      const taskRows = Object.entries(state.task_status)
        .map(([task, status]) => `
          <div class="task">
            <strong>${REQUIRED_LABELS[task] || task}</strong>
            <span class="status-${status}">${statusLabel(status)}</span>
          </div>
        `)
        .join("");

      return `
        <article class="state ${readyClass}">
          <div class="state-head">
            <div class="state-code">${state.state}</div>
            <div class="pill ${pillClass}">${pillText}</div>
          </div>
          <div class="progress-row">${state.complete_tasks}/${state.total_tasks} TASKS COMPLETE</div>
          <div class="bar"><span style="width:${state.progress_pct}%"></span></div>
          <div class="tasks">${taskRows}</div>
        </article>
      `;
    }

    async function refresh() {
      const errorBox = document.getElementById("errorBox");
      try {
        const res = await fetch("/api/research/state-progress", { cache: "no-store" });
        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }
        const data = await res.json();
        document.getElementById("updatedAt").textContent = `Updated · ${fmtDate(data.updated_at)}`;
        document.getElementById("readyStates").textContent = String(data.ready_states);
        document.getElementById("totalStates").textContent = String(data.total_states);
        const pct = data.total_states ? ((data.ready_states / data.total_states) * 100).toFixed(1) : "0.0";
        document.getElementById("overallPct").textContent = `${pct}%`;
        document.getElementById("stateGrid").innerHTML = data.states.map(stateCard).join("");
        errorBox.style.display = "none";
      } catch (err) {
        errorBox.style.display = "block";
        errorBox.textContent = `Could not load state progress: ${err.message}`;
      }
    }

    refresh();
    setInterval(refresh, 20000);
  </script>
</body>
</html>
